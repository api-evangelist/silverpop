naftiko: "1.0.0-alpha1"

info:
  label: "Silverpop Engage API"
  description: "Silverpop (Acoustic Campaign) REST API for digital marketing automation. Covers contact databases, email campaigns, transactional messaging, engagement reporting, and marketing automation programs."
  tags:
  - Email Marketing
  - Campaign Management
  - Contact Management
  - Marketing Automation
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SILVERPOP_ACCESS_TOKEN: SILVERPOP_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: silverpop
      baseUri: https://api-campaign-us-1.goacoustic.com
      description: "Silverpop Engage (Acoustic Campaign) REST API."
      authentication:
        type: bearer
        token: "{{SILVERPOP_ACCESS_TOKEN}}"
      resources:
        - name: databases
          path: /rest/databases
          description: "Contact database (list) management."
          operations:
            - name: list-databases
              method: GET
              description: "List all contact databases in the account."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: contacts
          path: /rest/databases/{database_id}/contacts
          description: "Contact management within a database."
          operations:
            - name: list-contacts
              method: GET
              description: "List contacts from a specific database."
              inputParameters:
                - name: database_id
                  in: path
                  type: string
                  required: true
                  description: "Contact database identifier."
                - name: count
                  in: query
                  type: integer
                  required: false
                  description: "Number of contacts to return."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-contact
              method: POST
              description: "Add a new contact to a database."
              inputParameters:
                - name: database_id
                  in: path
                  type: string
                  required: true
                  description: "Contact database identifier."
              body:
                type: json
                data:
                  email: "{{tools.email}}"
                  first_name: "{{tools.first_name}}"
                  last_name: "{{tools.last_name}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: contact
          path: /rest/databases/{database_id}/contacts/{contact_id}
          description: "Single contact operations."
          operations:
            - name: get-contact
              method: GET
              description: "Retrieve a specific contact's details."
              inputParameters:
                - name: database_id
                  in: path
                  type: string
                  required: true
                - name: contact_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-contact
              method: PUT
              description: "Update a contact's attributes."
              inputParameters:
                - name: database_id
                  in: path
                  type: string
                  required: true
                - name: contact_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: remove-contact
              method: DELETE
              description: "Remove a contact from a database."
              inputParameters:
                - name: database_id
                  in: path
                  type: string
                  required: true
                - name: contact_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: campaigns
          path: /rest/mailings
          description: "Email campaign management."
          operations:
            - name: list-campaigns
              method: GET
              description: "List all email campaigns."
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by campaign status."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-campaign
              method: POST
              description: "Create a new email campaign."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  subject: "{{tools.subject}}"
                  database_id: "{{tools.database_id}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: campaign
          path: /rest/mailings/{mailing_id}
          description: "Single campaign operations."
          operations:
            - name: get-campaign
              method: GET
              description: "Retrieve details of a specific campaign."
              inputParameters:
                - name: mailing_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: campaign-schedule
          path: /rest/mailings/{mailing_id}/schedule
          description: "Campaign scheduling."
          operations:
            - name: schedule-campaign
              method: POST
              description: "Schedule a campaign for delivery."
              inputParameters:
                - name: mailing_id
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  schedule_date: "{{tools.schedule_date}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: campaign-report
          path: /rest/reports/mailings/{mailing_id}/summary
          description: "Campaign performance reporting."
          operations:
            - name: get-campaign-summary
              method: GET
              description: "Retrieve aggregate performance metrics for a campaign."
              inputParameters:
                - name: mailing_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: campaign-opens
          path: /rest/reports/mailings/{mailing_id}/opens
          description: "Campaign open event reporting."
          operations:
            - name: get-campaign-opens
              method: GET
              description: "Retrieve open event data for a campaign."
              inputParameters:
                - name: mailing_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: campaign-clicks
          path: /rest/reports/mailings/{mailing_id}/clicks
          description: "Campaign click event reporting."
          operations:
            - name: get-campaign-clicks
              method: GET
              description: "Retrieve click event data for a campaign."
              inputParameters:
                - name: mailing_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: programs
          path: /rest/programs
          description: "Marketing automation program management."
          operations:
            - name: list-programs
              method: GET
              description: "List all marketing automation programs."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: program
          path: /rest/programs/{program_id}
          description: "Single program operations."
          operations:
            - name: get-program
              method: GET
              description: "Retrieve details of a specific program."
              inputParameters:
                - name: program_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: silverpop-rest
      resources:
        - path: /v1/databases
          name: databases
          operations:
            - method: GET
              name: list-databases
              description: "List contact databases."
        - path: /v1/campaigns
          name: campaigns
          operations:
            - method: GET
              name: list-campaigns
              description: "List campaigns."
            - method: POST
              name: create-campaign
              description: "Create a campaign."

    - type: mcp
      port: 9100
      namespace: silverpop-mcp
      transport: http
      tools:
        - name: list-databases
          description: "List all contact databases."
          hints:
            readOnly: true
          call: "silverpop.list-databases"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-contacts
          description: "List contacts from a database."
          hints:
            readOnly: true
          call: "silverpop.list-contacts"
          with:
            database_id: "tools.database_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-campaign-summary
          description: "Get campaign performance metrics."
          hints:
            readOnly: true
          call: "silverpop.get-campaign-summary"
          with:
            mailing_id: "tools.mailing_id"
          outputParameters:
            - type: object
              mapping: "$."

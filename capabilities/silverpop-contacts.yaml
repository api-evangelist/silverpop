naftiko: 1.0.0-alpha2
info:
  label: Silverpop Engage API (Acoustic Campaign) — Contacts
  description: 'Silverpop Engage API (Acoustic Campaign) — Contacts. 6 operations. Lead operation: List Databases. Self-contained
    Naftiko capability covering one Silverpop business surface.'
  tags:
  - Silverpop
  - Contacts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SILVERPOP_API_KEY: SILVERPOP_API_KEY
capability:
  consumes:
  - type: http
    namespace: silverpop-contacts
    baseUri: https://api-campaign-us-1.goacoustic.com
    description: Silverpop Engage API (Acoustic Campaign) — Contacts business capability. Self-contained, no shared references.
    resources:
    - name: rest-databases
      path: /rest/databases
      operations:
      - name: listdatabases
        method: GET
        description: List Databases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: rest-databases-database_id-contacts
      path: /rest/databases/{database_id}/contacts
      operations:
      - name: listcontacts
        method: GET
        description: List Contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: database_id
          in: path
          type: string
          description: Contact database identifier
          required: true
        - name: count
          in: query
          type: integer
          description: Number of contacts to return
        - name: offset
          in: query
          type: integer
          description: Pagination offset
      - name: addcontact
        method: POST
        description: Add Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: database_id
          in: path
          type: string
          description: Contact database identifier
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-databases-database_id-contacts-contact_id
      path: /rest/databases/{database_id}/contacts/{contact_id}
      operations:
      - name: getcontact
        method: GET
        description: Get Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: database_id
          in: path
          type: string
          required: true
        - name: contact_id
          in: path
          type: string
          required: true
      - name: updatecontact
        method: PUT
        description: Update Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: database_id
          in: path
          type: string
          required: true
        - name: contact_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removecontact
        method: DELETE
        description: Remove Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: database_id
          in: path
          type: string
          required: true
        - name: contact_id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.SILVERPOP_API_KEY}}'
  exposes:
  - type: rest
    namespace: silverpop-contacts-rest
    port: 8080
    description: REST adapter for Silverpop Engage API (Acoustic Campaign) — Contacts. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/databases
      name: rest-databases
      description: REST surface for rest-databases.
      operations:
      - method: GET
        name: listdatabases
        description: List Databases
        call: silverpop-contacts.listdatabases
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/databases/{database-id}/contacts
      name: rest-databases-database-id-contacts
      description: REST surface for rest-databases-database_id-contacts.
      operations:
      - method: GET
        name: listcontacts
        description: List Contacts
        call: silverpop-contacts.listcontacts
        with:
          database_id: rest.database_id
          count: rest.count
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addcontact
        description: Add Contact
        call: silverpop-contacts.addcontact
        with:
          database_id: rest.database_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/databases/{database-id}/contacts/{contact-id}
      name: rest-databases-database-id-contacts-contact-id
      description: REST surface for rest-databases-database_id-contacts-contact_id.
      operations:
      - method: GET
        name: getcontact
        description: Get Contact
        call: silverpop-contacts.getcontact
        with:
          database_id: rest.database_id
          contact_id: rest.contact_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatecontact
        description: Update Contact
        call: silverpop-contacts.updatecontact
        with:
          database_id: rest.database_id
          contact_id: rest.contact_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removecontact
        description: Remove Contact
        call: silverpop-contacts.removecontact
        with:
          database_id: rest.database_id
          contact_id: rest.contact_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: silverpop-contacts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Silverpop Engage API (Acoustic Campaign) — Contacts. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-databases
      description: List Databases
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: silverpop-contacts.listdatabases
      outputParameters:
      - type: object
        mapping: $.
    - name: list-contacts
      description: List Contacts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: silverpop-contacts.listcontacts
      with:
        database_id: tools.database_id
        count: tools.count
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: add-contact
      description: Add Contact
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: silverpop-contacts.addcontact
      with:
        database_id: tools.database_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-contact
      description: Get Contact
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: silverpop-contacts.getcontact
      with:
        database_id: tools.database_id
        contact_id: tools.contact_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-contact
      description: Update Contact
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: silverpop-contacts.updatecontact
      with:
        database_id: tools.database_id
        contact_id: tools.contact_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-contact
      description: Remove Contact
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: silverpop-contacts.removecontact
      with:
        database_id: tools.database_id
        contact_id: tools.contact_id
      outputParameters:
      - type: object
        mapping: $.
